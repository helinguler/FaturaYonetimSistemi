services:
  postgres:
    image: postgres:16
    container_name: invoice_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-invoice_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-invoice_pass_123}
      POSTGRES_DB: ${POSTGRES_DB:-invoice_root}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  pgadmin:
    image: dpage/pgadmin4
    container_name: invoice_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@invoice.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_pass_123}
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: